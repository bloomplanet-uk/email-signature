<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Bloom Email Signature Generator</title>
</head>

<body style="
  margin:0;
  padding:30px;
  background-color:#f5f5f5;
  font-family:Arial,Helvetica,sans-serif;
  color:#333333;
">

  <!-- Generator Form -->
  <div style="
    box-sizing:border-box;
    width:600px;
    max-width:100%;
    margin:0 0 30px 0;
    padding:20px;
    background-color:#ffffff;
    border:1px solid #dddddd;
  ">

    <h1 style="
      margin:0 0 20px 0;
      font-size:22px;
      line-height:28px;
      color:#333333;
    ">
      Bloom Email Signature Generator
    </h1>

    <label for="nameInput" style="
      display:block;
      margin:0 0 5px 0;
      font-size:13px;
    ">
      Full Name
    </label>

    <input
      id="nameInput"
      type="text"
      value="Full Name"
      autocomplete="off"
      style="
        box-sizing:border-box;
        width:100%;
        margin:0 0 12px 0;
        padding:9px;
        border:1px solid #cccccc;
        font-family:Arial,Helvetica,sans-serif;
        font-size:14px;
      "
    >

    <label for="positionInput" style="
      display:block;
      margin:0 0 5px 0;
      font-size:13px;
    ">
      Position
    </label>

    <input
      id="positionInput"
      type="text"
      value="position"
      autocomplete="off"
      style="
        box-sizing:border-box;
        width:100%;
        margin:0 0 12px 0;
        padding:9px;
        border:1px solid #cccccc;
        font-family:Arial,Helvetica,sans-serif;
        font-size:14px;
      "
    >

    <label for="teamInput" style="
      display:block;
      margin:0 0 5px 0;
      font-size:13px;
    ">
      Team
    </label>

    <input
      id="teamInput"
      type="text"
      value="team"
      autocomplete="off"
      style="
        box-sizing:border-box;
        width:100%;
        margin:0 0 12px 0;
        padding:9px;
        border:1px solid #cccccc;
        font-family:Arial,Helvetica,sans-serif;
        font-size:14px;
      "
    >

    <label for="emailInput" style="
      display:block;
      margin:0 0 5px 0;
      font-size:13px;
    ">
      Email
    </label>

    <input
      id="emailInput"
      type="email"
      value="email@bloomplanet.uk"
      autocomplete="off"
      style="
        box-sizing:border-box;
        width:100%;
        margin:0 0 12px 0;
        padding:9px;
        border:1px solid #cccccc;
        font-family:Arial,Helvetica,sans-serif;
        font-size:14px;
      "
    >

    <label for="phoneInput" style="
      display:block;
      margin:0 0 5px 0;
      font-size:13px;
    ">
      Phone Number
    </label>

    <input
      id="phoneInput"
      type="text"
      value="+20 112 345 6789"
      autocomplete="off"
      style="
        box-sizing:border-box;
        width:100%;
        margin:0 0 12px 0;
        padding:9px;
        border:1px solid #cccccc;
        font-family:Arial,Helvetica,sans-serif;
        font-size:14px;
      "
    >

    <label for="websiteInput" style="
      display:block;
      margin:0 0 5px 0;
      font-size:13px;
    ">
      Website
    </label>

    <input
      id="websiteInput"
      type="text"
      value="www.bloomplanet.uk"
      autocomplete="off"
      style="
        box-sizing:border-box;
        width:100%;
        margin:0 0 18px 0;
        padding:9px;
        border:1px solid #cccccc;
        font-family:Arial,Helvetica,sans-serif;
        font-size:14px;
      "
    >

    <button
      type="button"
      onclick="copySignature()"
      style="
        padding:11px 20px;
        background-color:#50ad55;
        color:#ffffff;
        border:0;
        cursor:pointer;
        font-family:Arial,Helvetica,sans-serif;
        font-size:14px;
        font-weight:bold;
      "
    >
      Copy Email Signature
    </button>

    <span
      id="copyMessage"
      style="
        display:inline-block;
        margin-left:10px;
        font-size:13px;
        color:#50ad55;
      "
    ></span>

  </div>


  <!-- Preview Container -->
  <div style="
    display:inline-block;
    padding:20px;
    background-color:transparent;
  ">

    <!-- Complete Email Signature -->
    <table
      id="emailSignature"
      role="presentation"
      cellpadding="0"
      cellspacing="0"
      border="0"
      width="520"
      bgcolor="#ffffff"
      style="
        width:520px;
        border-collapse:collapse;
        border-spacing:0;
        background-color:#ffffff !important;
        background-image:linear-gradient(#ffffff,#ffffff);
        font-family:Arial,Helvetica,sans-serif;
        color:#4a4a4a;
      "
    >

      <!-- Top Section -->
      <tr>
        <td
          align="center"
          bgcolor="#ffffff"
          style="
            padding:16px 10px 14px 10px;
            background-color:#ffffff !important;
            background-image:linear-gradient(#ffffff,#ffffff);
          "
        >

          <!-- Unified Top Width: 500px -->
          <table
            role="presentation"
            cellpadding="0"
            cellspacing="0"
            border="0"
            width="500"
            bgcolor="#ffffff"
            style="
              width:500px;
              table-layout:fixed;
              border-collapse:collapse;
              border-spacing:0;
              background-color:#ffffff !important;
              background-image:linear-gradient(#ffffff,#ffffff);
            "
          >
            <tr>

              <!-- Main Logo Area -->
              <td
                width="170"
                align="center"
                valign="middle"
                bgcolor="#ffffff"
                style="
                  width:170px;
                  padding:10px 0;
                  text-align:center;
                  vertical-align:middle;
                  background-color:#ffffff !important;
                  background-image:linear-gradient(#ffffff,#ffffff);
                "
              >
                <img
                  src="https://res.cloudinary.com/jl1xi0k5/image/upload/v1784505098/bloom-group-logo.png_oy0q4e.png"
                  alt="Bloom Planet Group"
                  width="130"
                  border="0"
                  style="
                    display:block;
                    width:130px;
                    max-width:130px;
                    height:auto;
                    margin:0 auto;
                    border:0;
                    outline:none;
                    text-decoration:none;
                  "
                >
              </td>

              <!-- Vertical Divider -->
              <td
                width="1"
                bgcolor="#d8d8d8"
                style="
                  width:1px;
                  min-width:1px;
                  padding:0;
                  background-color:#d8d8d8;
                  font-size:0;
                  line-height:0;
                "
              >
                &nbsp;
              </td>

              <!-- Personal Information -->
              <td
                width="329"
                valign="middle"
                bgcolor="#ffffff"
                style="
                  width:329px;
                  padding:10px 8px 10px 26px;
                  vertical-align:middle;
                  background-color:#ffffff !important;
                  background-image:linear-gradient(#ffffff,#ffffff);
                "
              >

                <table
                  role="presentation"
                  cellpadding="0"
                  cellspacing="0"
                  border="0"
                  width="100%"
                  style="
                    width:100%;
                    border-collapse:collapse;
                    border-spacing:0;
                  "
                >

                  <!-- Name -->
                  <tr>
                    <td
                      id="signatureName"
                      style="
                        padding:0 0 4px 0;
                        font-family:Arial,Helvetica,sans-serif;
                        font-size:16px;
                        line-height:20px;
                        mso-line-height-rule:exactly;
                        font-weight:bold;
                        color:#3f3f3f !important;
                        -webkit-text-fill-color:#3f3f3f;
                      "
                    >
                      Ali Adel
                    </td>
                  </tr>

                  <!-- Position and Team -->
                  <tr id="positionTeamRow">
                    <td
                      style="
                        padding:0 0 11px 0;
                        font-family:Arial,Helvetica,sans-serif;
                        font-size:11px;
                        line-height:16px;
                        mso-line-height-rule:exactly;
                        font-weight:normal;
                        color:#666666 !important;
                        -webkit-text-fill-color:#666666;
                      "
                    >
                      <span id="signaturePosition">Chief Operating Officer</span>
                      <span id="teamSeparator"> | </span>
                      <span id="signatureTeam">Marketing Team</span>
                    </td>
                  </tr>

                  <!-- Email -->
                  <tr id="emailRow">
                    <td
                      style="
                        padding:0;
                        font-family:Arial,Helvetica,sans-serif;
                        font-size:11px;
                        line-height:17px;
                        mso-line-height-rule:exactly;
                        color:#555555 !important;
                        -webkit-text-fill-color:#555555;
                      "
                    >
                      E:
                      <a
                        id="signatureEmail"
                        href="mailto:ali.egy@bloomplanet.uk"
                        style="
                          color:#555555 !important;
                          -webkit-text-fill-color:#555555;
                          text-decoration:none;
                        "
                      >
                        ali.egy@bloomplanet.uk
                      </a>
                    </td>
                  </tr>

                  <!-- Phone -->
                  <tr id="phoneRow">
                    <td
                      style="
                        padding:0;
                        font-family:Arial,Helvetica,sans-serif;
                        font-size:11px;
                        line-height:17px;
                        mso-line-height-rule:exactly;
                        color:#555555 !important;
                        -webkit-text-fill-color:#555555;
                      "
                    >
                      M:
                      <a
                        id="signaturePhone"
                        href="tel:+201156859925"
                        style="
                          color:#555555 !important;
                          -webkit-text-fill-color:#555555;
                          text-decoration:none;
                        "
                      >
                        +20 115 685 9925
                      </a>
                    </td>
                  </tr>

                  <!-- Website -->
                  <tr id="websiteRow">
                    <td
                      style="
                        padding:0;
                        font-family:Arial,Helvetica,sans-serif;
                        font-size:11px;
                        line-height:17px;
                        mso-line-height-rule:exactly;
                        color:#555555 !important;
                        -webkit-text-fill-color:#555555;
                      "
                    >
                      W:
                      <a
                        id="signatureWebsite"
                        href="https://www.bloomplanet.uk"
                        style="
                          color:#555555 !important;
                          -webkit-text-fill-color:#555555;
                          text-decoration:none;
                        "
                      >
                        www.bloomplanet.uk
                      </a>
                    </td>
                  </tr>

                </table>

              </td>
            </tr>
          </table>

        </td>
      </tr>


      <!-- Horizontal Divider -->
      <tr>
        <td
          align="center"
          bgcolor="#ffffff"
          style="
            padding:0 10px;
            background-color:#ffffff !important;
            background-image:linear-gradient(#ffffff,#ffffff);
          "
        >
          <table
            role="presentation"
            cellpadding="0"
            cellspacing="0"
            border="0"
            width="500"
            style="
              width:500px;
              border-collapse:collapse;
              border-spacing:0;
            "
          >
            <tr>
              <td
                height="1"
                style="
                  height:1px;
                  padding:0;
                  border-top:1px solid #d8d8d8;
                  font-size:0;
                  line-height:0;
                "
              >
                &nbsp;
              </td>
            </tr>
          </table>
        </td>
      </tr>


      <!-- Bottom Logos -->
      <tr>
        <td
          align="center"
          bgcolor="#ffffff"
          style="
            padding:13px 10px 15px 10px;
            background-color:#ffffff !important;
            background-image:linear-gradient(#ffffff,#ffffff);
          "
        >

          <!-- Unified Bottom Width: 500px -->
          <table
            role="presentation"
            cellpadding="0"
            cellspacing="0"
            border="0"
            width="500"
            bgcolor="#ffffff"
            style="
              width:500px;
              table-layout:fixed;
              border-collapse:collapse;
              border-spacing:0;
              background-color:#ffffff !important;
              background-image:linear-gradient(#ffffff,#ffffff);
            "
          >
            <tr>

              <!-- Left Margin -->
              <td width="10" style="width:10px;font-size:0;line-height:0;">
                &nbsp;
              </td>

              <!-- Bloom Planet -->
              <td
                width="116"
                height="54"
                align="center"
                valign="middle"
                style="
                  width:116px;
                  height:54px;
                  text-align:center;
                  vertical-align:middle;
                "
              >
                <img
                  src="https://res.cloudinary.com/jl1xi0k5/image/upload/v1784505099/bloom-planet-logo-v2.png_f6gxvi.png"
                  alt="Bloom Planet"
                  width="108"
                  border="0"
                  style="
                    display:block;
                    width:108px;
                    max-width:108px;
                    height:auto;
                    margin:0 auto;
                    border:0;
                    outline:none;
                    text-decoration:none;
                  "
                >
              </td>

              <!-- Equal Gap -->
              <td width="22" style="width:22px;font-size:0;line-height:0;">
                &nbsp;
              </td>

              <!-- O-LABORATORY -->
              <td
                width="124"
                height="54"
                align="center"
                valign="middle"
                style="
                  width:124px;
                  height:54px;
                  text-align:center;
                  vertical-align:middle;
                "
              >
                <img
                  src="https://res.cloudinary.com/jl1xi0k5/image/upload/v1784504443/o-laboratory-logo-v2.png_inwysb.png"
                  alt="O-LABORATORY"
                  width="116"
                  border="0"
                  style="
                    display:block;
                    width:116px;
                    max-width:116px;
                    height:auto;
                    margin:0 auto;
                    border:0;
                    outline:none;
                    text-decoration:none;
                  "
                >
              </td>

              <!-- Equal Gap -->
              <td width="22" style="width:22px;font-size:0;line-height:0;">
                &nbsp;
              </td>

              <!-- Bloom Arena -->
              <td
                width="70"
                height="54"
                align="center"
                valign="middle"
                style="
                  width:70px;
                  height:54px;
                  text-align:center;
                  vertical-align:middle;
                "
              >
                <img
                  src="https://res.cloudinary.com/jl1xi0k5/image/upload/v1784505065/bloom-arena-logo.png_xinjr9.png"
                  alt="Bloom Arena"
                  width="62"
                  border="0"
                  style="
                    display:block;
                    width:62px;
                    max-width:62px;
                    height:auto;
                    margin:0 auto;
                    border:0;
                    outline:none;
                    text-decoration:none;
                  "
                >
              </td>

              <!-- Equal Gap -->
              <td width="22" style="width:22px;font-size:0;line-height:0;">
                &nbsp;
              </td>

              <!-- Bloom Planet Egypt -->
              <td
                width="104"
                height="54"
                align="center"
                valign="middle"
                style="
                  width:104px;
                  height:54px;
                  text-align:center;
                  vertical-align:middle;
                "
              >
                <img
                  src="https://res.cloudinary.com/jl1xi0k5/image/upload/v1784558449/bloom-planet-egypt-logo.png_ohfb2w.png"
                  alt="Bloom Planet Egypt"
                  width="96"
                  border="0"
                  style="
                    display:block;
                    width:96px;
                    max-width:96px;
                    height:auto;
                    margin:0 auto;
                    border:0;
                    outline:none;
                    text-decoration:none;
                  "
                >
              </td>

              <!-- Right Margin -->
              <td width="10" style="width:10px;font-size:0;line-height:0;">
                &nbsp;
              </td>

            </tr>
          </table>

        </td>
      </tr>

    </table>
  </div>


  <script>
    const nameInput = document.getElementById("nameInput");
    const positionInput = document.getElementById("positionInput");
    const teamInput = document.getElementById("teamInput");
    const emailInput = document.getElementById("emailInput");
    const phoneInput = document.getElementById("phoneInput");
    const websiteInput = document.getElementById("websiteInput");

    function updateSignature() {
      const name = nameInput.value.trim();
      const position = positionInput.value.trim();
      const team = teamInput.value.trim();
      const email = emailInput.value.trim();
      const phone = phoneInput.value.trim();
      const website = websiteInput.value.trim();

      document.getElementById("signatureName").textContent = name;

      document.getElementById("signaturePosition").textContent = position;
      document.getElementById("signatureTeam").textContent = team;

      document.getElementById("teamSeparator").style.display =
        position && team ? "inline" : "none";

      document.getElementById("positionTeamRow").style.display =
        position || team ? "table-row" : "none";

      const emailRow = document.getElementById("emailRow");
      const emailLink = document.getElementById("signatureEmail");

      emailRow.style.display = email ? "table-row" : "none";
      emailLink.textContent = email;
      emailLink.href = "mailto:" + email;

      const phoneRow = document.getElementById("phoneRow");
      const phoneLink = document.getElementById("signaturePhone");

      phoneRow.style.display = phone ? "table-row" : "none";
      phoneLink.textContent = phone;
      phoneLink.href = "tel:" + phone.replace(/[^\d+]/g, "");

      const websiteRow = document.getElementById("websiteRow");
      const websiteLink = document.getElementById("signatureWebsite");

      websiteRow.style.display = website ? "table-row" : "none";
      websiteLink.textContent = website;

      if (
        website.startsWith("http://") ||
        website.startsWith("https://")
      ) {
        websiteLink.href = website;
      } else {
        websiteLink.href = "https://" + website;
      }

      document.getElementById("copyMessage").textContent = "";
    }

    [
      nameInput,
      positionInput,
      teamInput,
      emailInput,
      phoneInput,
      websiteInput
    ].forEach(function(input) {
      input.addEventListener("input", updateSignature);
    });

    function copySignature() {
      const signature = document.getElementById("emailSignature");
      const message = document.getElementById("copyMessage");

      const range = document.createRange();
      const selection = window.getSelection();

      range.selectNode(signature);
      selection.removeAllRanges();
      selection.addRange(range);

      const copied = document.execCommand("copy");

      selection.removeAllRanges();

      message.textContent = copied
        ? "Signature copied successfully."
        : "Select the signature and press Ctrl + C.";
    }

    updateSignature();
  </script>

</body>
</html>
