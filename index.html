<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1"
  >

  <title>Bloom Email Signature Generator</title>
</head>

<body style="
  margin:0;
  padding:30px;
  background-color:#f5f5f5;
  font-family:Arial, Helvetica, sans-serif;
  color:#333333;
">

  <!-- ======================================================
       GENERATOR FORM
  ======================================================= -->

  <div style="
    box-sizing:border-box;
    width:600px;
    max-width:100%;
    margin:0 0 30px 0;
    padding:20px;
    background-color:#ffffff;
    border:1px solid #dddddd;
  ">

    <h1 style="
      margin:0 0 20px 0;
      font-family:Arial, Helvetica, sans-serif;
      font-size:22px;
      line-height:28px;
      color:#333333;
    ">
      Bloom Email Signature Generator
    </h1>


    <!-- Full Name -->

    <label
      for="nameInput"
      style="
        display:block;
        margin:0 0 5px 0;
        font-size:13px;
      "
    >
      Full Name
    </label>

    <input
      id="nameInput"
      type="text"
      value="Full Name"
      autocomplete="off"
      style="
        box-sizing:border-box;
        width:100%;
        margin:0 0 12px 0;
        padding:9px;
        border:1px solid #cccccc;
        font-family:Arial, Helvetica, sans-serif;
        font-size:14px;
      "
    >


    <!-- Position -->

    <label
      for="positionInput"
      style="
        display:block;
        margin:0 0 5px 0;
        font-size:13px;
      "
    >
      Position
    </label>

    <input
      id="positionInput"
      type="text"
      value="Job Title"
      autocomplete="off"
      style="
        box-sizing:border-box;
        width:100%;
        margin:0 0 12px 0;
        padding:9px;
        border:1px solid #cccccc;
        font-family:Arial, Helvetica, sans-serif;
        font-size:14px;
      "
    >


    <!-- Team -->

    <label
      for="teamInput"
      style="
        display:block;
        margin:0 0 5px 0;
        font-size:13px;
      "
    >
      Team
    </label>

    <input
      id="teamInput"
      type="text"
      value="Department"
      autocomplete="off"
      style="
        box-sizing:border-box;
        width:100%;
        margin:0 0 12px 0;
        padding:9px;
        border:1px solid #cccccc;
        font-family:Arial, Helvetica, sans-serif;
        font-size:14px;
      "
    >


    <!-- Email -->

    <label
      for="emailInput"
      style="
        display:block;
        margin:0 0 5px 0;
        font-size:13px;
      "
    >
      Email
    </label>

    <input
      id="emailInput"
      type="email"
      value="email@bloomplanet.com"
      autocomplete="off"
      style="
        box-sizing:border-box;
        width:100%;
        margin:0 0 12px 0;
        padding:9px;
        border:1px solid #cccccc;
        font-family:Arial, Helvetica, sans-serif;
        font-size:14px;
      "
    >


    <!-- Phone -->

    <label
      for="phoneInput"
      style="
        display:block;
        margin:0 0 5px 0;
        font-size:13px;
      "
    >
      Phone Number
    </label>

    <input
      id="phoneInput"
      type="text"
      value="+00 000 000 0000"
      autocomplete="off"
      style="
        box-sizing:border-box;
        width:100%;
        margin:0 0 12px 0;
        padding:9px;
        border:1px solid #cccccc;
        font-family:Arial, Helvetica, sans-serif;
        font-size:14px;
      "
    >


    <!-- Website -->

    <label
      for="websiteInput"
      style="
        display:block;
        margin:0 0 5px 0;
        font-size:13px;
      "
    >
      Website
    </label>

    <input
      id="websiteInput"
      type="text"
      value="www.bloomplanet.uk"
      autocomplete="off"
      style="
        box-sizing:border-box;
        width:100%;
        margin:0 0 18px 0;
        padding:9px;
        border:1px solid #cccccc;
        font-family:Arial, Helvetica, sans-serif;
        font-size:14px;
      "
    >


    <!-- Copy Button -->

    <button
      type="button"
      onclick="copySignature()"
      style="
        padding:11px 20px;
        background-color:#50ad55;
        color:#ffffff;
        border:0;
        cursor:pointer;
        font-family:Arial, Helvetica, sans-serif;
        font-size:14px;
        font-weight:bold;
      "
    >
      Copy Email Signature
    </button>

    <span
      id="copyMessage"
      style="
        display:inline-block;
        margin-left:10px;
        font-size:13px;
        color:#50ad55;
      "
    ></span>

  </div>


  <!-- ======================================================
       SIGNATURE PREVIEW
  ======================================================= -->

  <div style="
    display:inline-block;
    padding:20px;
    background-color:transparent;
  ">

    <table
      id="emailSignature"
      role="presentation"
      cellpadding="0"
      cellspacing="0"
      border="0"
      width="520"
      bgcolor="#ffffff"
      style="
        width:520px;
        border-collapse:collapse;
        border-spacing:0;
        background-color:#ffffff !important;
        background-image:linear-gradient(#ffffff,#ffffff);
        font-family:Arial, Helvetica, sans-serif;
        color:#4a4a4a;
      "
    >


      <!-- ==================================================
           UPPER SECTION
      =================================================== -->

      <tr>
        <td
          align="center"
          bgcolor="#ffffff"
          style="
            padding:16px 10px 14px 10px;
            background-color:#ffffff !important;
            background-image:linear-gradient(#ffffff,#ffffff);
          "
        >

          <table
            role="presentation"
            cellpadding="0"
            cellspacing="0"
            border="0"
            width="500"
            bgcolor="#ffffff"
            style="
              width:500px;
              table-layout:fixed;
              border-collapse:collapse;
              border-spacing:0;
              background-color:#ffffff !important;
              background-image:linear-gradient(#ffffff,#ffffff);
            "
          >

            <tr>

              <!-- Main Bloom Group Logo -->

              <td
                width="170"
                align="center"
                valign="middle"
                bgcolor="#ffffff"
                style="
                  width:170px;
                  padding:10px 0;
                  text-align:center;
                  vertical-align:middle;
                  background-color:#ffffff !important;
                  background-image:linear-gradient(#ffffff,#ffffff);
                "
              >

                <img
                  src="https://res.cloudinary.com/jl1xi0k5/image/upload/v1784505098/bloom-group-logo.png_oy0q4e.png"
                  alt="Bloom Planet Group"
                  width="130"
                  border="0"
                  style="
                    display:block;
                    width:130px;
                    max-width:130px;
                    height:auto;
                    margin:0 auto;
                    border:0;
                    outline:none;
                    text-decoration:none;
                  "
                >

              </td>


              <!-- Vertical Divider -->

              <td
                width="1"
                bgcolor="#d8d8d8"
                style="
                  width:1px;
                  min-width:1px;
                  padding:0;
                  background-color:#d8d8d8;
                  font-size:0;
                  line-height:0;
                "
              >
                &nbsp;
              </td>


              <!-- Employee Information -->

              <td
                width="329"
                valign="middle"
                bgcolor="#ffffff"
                style="
                  width:329px;
                  padding:10px 8px 10px 26px;
                  vertical-align:middle;
                  background-color:#ffffff !important;
                  background-image:linear-gradient(#ffffff,#ffffff);
                "
              >

                <table
                  role="presentation"
                  cellpadding="0"
                  cellspacing="0"
                  border="0"
                  width="100%"
                  style="
                    width:100%;
                    border-collapse:collapse;
                    border-spacing:0;
                  "
                >


                  <!-- Name -->

                  <tr>
                    <td
                      id="signatureName"
                      style="
                        padding:0 0 4px 0;
                        font-family:Arial, Helvetica, sans-serif;
                        font-size:16px;
                        line-height:20px;
                        mso-line-height-rule:exactly;
                        font-weight:bold;
                        color:#3f3f3f !important;
                        -webkit-text-fill-color:#3f3f3f;
                      "
                    >
                      Full Name
                    </td>
                  </tr>


                  <!-- Position and Team -->

                  <tr id="positionTeamRow">
                    <td
                      style="
                        padding:0 0 11px 0;
                        font-family:Arial, Helvetica, sans-serif;
                        font-size:11px;
                        line-height:16px;
                        mso-line-height-rule:exactly;
                        font-weight:normal;
                        color:#666666 !important;
                        -webkit-text-fill-color:#666666;
                      "
                    >

                      <span id="signaturePosition">
                        Job Title
                      </span>

                      <span id="teamSeparator">
                        &nbsp;|&nbsp;
                      </span>

                      <span id="signatureTeam">
                        Department
                      </span>

                    </td>
                  </tr>


                  <!-- Email -->

                  <tr id="emailRow">
                    <td
                      style="
                        padding:0;
                        font-family:Arial, Helvetica, sans-serif;
                        font-size:11px;
                        line-height:17px;
                        mso-line-height-rule:exactly;
                        color:#555555 !important;
                        -webkit-text-fill-color:#555555;
                      "
                    >

                      E:

                      <a
                        id="signatureEmail"
                        href="mailto:email@bloomplanet.com"
                        style="
                          color:#555555 !important;
                          -webkit-text-fill-color:#555555;
                          text-decoration:none;
                        "
                      >
                        email@bloomplanet.com
                      </a>

                    </td>
                  </tr>


                  <!-- Phone -->

                  <tr id="phoneRow">
                    <td
                      style="
                        padding:0;
                        font-family:Arial, Helvetica, sans-serif;
                        font-size:11px;
                        line-height:17px;
                        mso-line-height-rule:exactly;
                        color:#555555 !important;
                        -webkit-text-fill-color:#555555;
                      "
                    >

                      M:

                      <a
                        id="signaturePhone"
                        href="tel:+000000000000"
                        style="
                          color:#555555 !important;
                          -webkit-text-fill-color:#555555;
                          text-decoration:none;
                        "
                      >
                        +00 000 000 0000
                      </a>

                    </td>
                  </tr>


                  <!-- Website -->

                  <tr id="websiteRow">
                    <td
                      style="
                        padding:0;
                        font-family:Arial, Helvetica, sans-serif;
                        font-size:11px;
                        line-height:17px;
                        mso-line-height-rule:exactly;
                        color:#555555 !important;
                        -webkit-text-fill-color:#555555;
                      "
                    >

                      W:

                      <a
                        id="signatureWebsite"
                        href="https://www.bloomplanet.uk"
                        style="
                          color:#555555 !important;
                          -webkit-text-fill-color:#555555;
                          text-decoration:none;
                        "
                      >
                        www.bloomplanet.uk
                      </a>

                    </td>
                  </tr>

                </table>

              </td>

            </tr>

          </table>

        </td>
      </tr>


      <!-- ==================================================
           HORIZONTAL DIVIDER
      =================================================== -->

      <tr>
        <td
          align="center"
          bgcolor="#ffffff"
          style="
            padding:0 10px;
            background-color:#ffffff !important;
            background-image:linear-gradient(#ffffff,#ffffff);
          "
        >

          <table
            role="presentation"
            cellpadding="0"
            cellspacing="0"
            border="0"
            width="500"
            style="
              width:500px;
              border-collapse:collapse;
              border-spacing:0;
            "
          >

            <tr>
              <td
                height="1"
                style="
                  height:1px;
                  padding:0;
                  border-top:1px solid #d8d8d8;
                  font-size:0;
                  line-height:0;
                "
              >
                &nbsp;
              </td>
            </tr>

          </table>

        </td>
      </tr>


      <!-- ==================================================
           BOTTOM LOGO STRIP
      =================================================== -->

      <tr>
        <td
          align="center"
          bgcolor="#ffffff"
          style="
            padding:12px 10px 14px 10px;
            background-color:#ffffff !important;
            background-image:linear-gradient(#ffffff,#ffffff);
          "
        >

          <img
            src="https://res.cloudinary.com/jl1xi0k5/image/upload/v1784824109/Artboard_1_kcabnr.png"
            alt="Bloom Planet Brands"
            width="500"
            border="0"
            style="
              display:block;
              width:500px;
              max-width:500px;
              height:auto;
              margin:0 auto;
              border:0;
              outline:none;
              text-decoration:none;
              background-color:#ffffff;
            "
          >

        </td>
      </tr>

    </table>

  </div>


  <!-- ======================================================
       JAVASCRIPT
  ======================================================= -->

  <script>
    const nameInput =
      document.getElementById("nameInput");

    const positionInput =
      document.getElementById("positionInput");

    const teamInput =
      document.getElementById("teamInput");

    const emailInput =
      document.getElementById("emailInput");

    const phoneInput =
      document.getElementById("phoneInput");

    const websiteInput =
      document.getElementById("websiteInput");


    function updateSignature() {
      const name =
        nameInput.value.trim();

      const position =
        positionInput.value.trim();

      const team =
        teamInput.value.trim();

      const email =
        emailInput.value.trim();

      const phone =
        phoneInput.value.trim();

      const website =
        websiteInput.value.trim();


      document.getElementById(
        "signatureName"
      ).textContent = name;


      document.getElementById(
        "signaturePosition"
      ).textContent = position;


      document.getElementById(
        "signatureTeam"
      ).textContent = team;


      document.getElementById(
        "teamSeparator"
      ).style.display =
        position && team ? "inline" : "none";


      document.getElementById(
        "positionTeamRow"
      ).style.display =
        position || team
          ? "table-row"
          : "none";


      const emailRow =
        document.getElementById("emailRow");

      const emailLink =
        document.getElementById("signatureEmail");


      emailRow.style.display =
        email ? "table-row" : "none";

      emailLink.textContent =
        email;

      emailLink.href =
        "mailto:" + email;


      const phoneRow =
        document.getElementById("phoneRow");

      const phoneLink =
        document.getElementById("signaturePhone");


      phoneRow.style.display =
        phone ? "table-row" : "none";

      phoneLink.textContent =
        phone;

      phoneLink.href =
        "tel:" +
        phone.replace(/[^\d+]/g, "");


      const websiteRow =
        document.getElementById("websiteRow");

      const websiteLink =
        document.getElementById("signatureWebsite");


      websiteRow.style.display =
        website ? "table-row" : "none";

      websiteLink.textContent =
        website;


      if (
        website.startsWith("http://") ||
        website.startsWith("https://")
      ) {
        websiteLink.href = website;
      } else {
        websiteLink.href =
          "https://" + website;
      }


      document.getElementById(
        "copyMessage"
      ).textContent = "";
    }


    [
      nameInput,
      positionInput,
      teamInput,
      emailInput,
      phoneInput,
      websiteInput
    ].forEach(function(input) {
      input.addEventListener(
        "input",
        updateSignature
      );
    });


    function copySignature() {
      const signature =
        document.getElementById(
          "emailSignature"
        );

      const message =
        document.getElementById(
          "copyMessage"
        );

      const range =
        document.createRange();

      const selection =
        window.getSelection();


      range.selectNode(signature);

      selection.removeAllRanges();

      selection.addRange(range);


      const copied =
        document.execCommand("copy");


      selection.removeAllRanges();


      message.textContent =
        copied
          ? "Signature copied successfully."
          : "Select the signature and press Ctrl + C.";
    }


    updateSignature();
  </script>

</body>
</html>
